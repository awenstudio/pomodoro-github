<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>🐾 Pawodoro — Asset Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1A1814; color: #FFFDF7; font-family: -apple-system, sans-serif; padding: 40px 20px; }
    h1 { font-size: 28px; margin-bottom: 8px; }
    .subtitle { color: #999; font-size: 14px; margin-bottom: 40px; }
    .section { margin-bottom: 48px; }
    .section h2 { font-size: 18px; color: #5AAF5E; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; }
    .card { background: rgba(255,248,230,0.04); border: 1px solid rgba(255,248,230,0.08); border-radius: 16px; padding: 16px; text-align: center; transition: transform 0.2s; }
    .card:hover { transform: translateY(-2px); background: rgba(255,248,230,0.07); }
    .card img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 12px; }
    .card p { font-size: 12px; color: #999; margin-top: 8px; }
    .anim-row { display: flex; gap: 12px; align-items: flex-start; flex-wrap: wrap; }
    .anim-card { background: rgba(255,248,230,0.04); border: 1px solid rgba(255,248,230,0.08); border-radius: 16px; padding: 16px; text-align: center; }
    .anim-card h3 { font-size: 13px; color: #FFB87A; margin-bottom: 12px; }
    .anim-frames { display: flex; gap: 6px; }
    .anim-frames img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 2px solid transparent; transition: border-color 0.2s; }
    .anim-frames img.active { border-color: #5AAF5E; }
    .preview-box { width: 200px; height: 200px; margin: 12px auto 0; border-radius: 16px; overflow: hidden; background: #22201A; display: flex; align-items: center; justify-content: center; }
    .preview-box img { width: 100%; height: 100%; object-fit: cover; }
  </style>
</head>
<body>
  <h1>🐾 Pawodoro Assets</h1>
  <p class="subtitle">AI-generated pet illustrations & animations</p>

  <div class="section">
    <h2>🐕 Pet Illustrations</h2>
    <div class="grid" id="pets"></div>
  </div>

  <div class="section">
    <h2>🥚 Hatching Animation</h2>
    <div class="anim-row">
      <div class="anim-card">
        <h3>Frames</h3>
        <div class="anim-frames" id="hatch-frames"></div>
      </div>
      <div class="anim-card">
        <h3>Preview</h3>
        <div class="preview-box"><img id="hatch-preview" src="animations/egg-01.jpg"></div>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>🐕 Idle Animation</h2>
    <div class="anim-row">
      <div class="anim-card">
        <h3>Frames</h3>
        <div class="anim-frames" id="idle-frames"></div>
      </div>
      <div class="anim-card">
        <h3>Preview</h3>
        <div class="preview-box"><img id="idle-preview" src="animations/idle-01.jpg"></div>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>🚶 Walk Animation</h2>
    <div class="anim-row">
      <div class="anim-card">
        <h3>Frames</h3>
        <div class="anim-frames" id="walk-frames"></div>
      </div>
      <div class="anim-card">
        <h3>Preview</h3>
        <div class="preview-box"><img id="walk-preview" src="animations/walk-01.jpg"></div>
      </div>
    </div>
  </div>

  <script>
    // Pet illustrations
    const pets = ['shiba-inu','cat','rabbit','fox','penguin','panda','dragon','robot','alien'];
    const petGrid = document.getElementById('pets');
    pets.forEach(p => {
      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `<img src="pets/${p}.jpg" alt="${p}"><p>${p}</p>`;
      petGrid.appendChild(div);
    });

    // Animation previewer
    function setupAnim(name, frames, speed) {
      const container = document.getElementById(`${name}-frames`);
      const preview = document.getElementById(`${name}-preview`);
      frames.forEach((f, i) => {
        const img = document.createElement('img');
        img.src = `animations/${f}`;
        if (i === 0) img.className = 'active';
        container.appendChild(img);
      });

      let idx = 0;
      setInterval(() => {
        idx = (idx + 1) % frames.length;
        preview.src = `animations/${frames[idx]}`;
        container.querySelectorAll('img').forEach((img, i) => {
          img.className = i === idx ? 'active' : '';
        });
      }, speed);
    }

    setupAnim('hatch', ['egg-01.jpg','egg-02.jpg','egg-03.jpg','egg-04.jpg','egg-05.jpg'], 800);
    setupAnim('idle', ['idle-01.jpg','idle-02.jpg','idle-03.jpg','idle-02.jpg'], 900);
    setupAnim('walk', ['walk-01.jpg','walk-02.jpg'], 500);
  </script>
</body>
</html>
