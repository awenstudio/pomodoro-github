<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Pawodoro — Icon Preview</title>
  <style>
    body { background: #1A1814; color: #FFFDF7; font-family: -apple-system, sans-serif; padding: 40px; }
    h1 { font-size: 24px; margin-bottom: 30px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
    .card { background: rgba(255,248,230,0.04); border: 1px solid rgba(255,248,230,0.08); border-radius: 16px; padding: 20px; text-align: center; }
    .card img { width: 64px; height: 64px; image-rendering: -webkit-optimize-contrast; }
    .card p { font-size: 12px; color: #999; margin-top: 8px; }
    .section { margin-top: 40px; }
    .section h2 { font-size: 16px; color: #5AAF5E; margin-bottom: 16px; }
  </style>
</head>
<body>
  <h1>🐾 Pawodoro Icons</h1>
  
  <div class="section">
    <h2>App Icons</h2>
    <div class="grid">
      <div class="card"><img src="icons/tomato128.png"><p>128×128</p></div>
      <div class="card"><img src="icons/tomato48.png"><p>48×48</p></div>
      <div class="card"><img src="icons/tomato16.png"><p>16×16</p></div>
    </div>
  </div>

  <div class="section">
    <h2>Pet Icons</h2>
    <div class="grid" id="pets"></div>
  </div>

  <script>
    const species = ['shiba','cat','rabbit','fox','penguin','panda','dragon','robot','alien'];
    const container = document.getElementById('pets');
    species.forEach(sp => {
      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `<img src="icons/pet-${sp}.png"><p>${sp}</p>`;
      container.appendChild(div);
    });
  </script>
</body>
</html>
